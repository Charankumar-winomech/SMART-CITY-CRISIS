<section class="city-card-red alert-strip">
  <div class="flex min-w-max items-center gap-3 pr-4 font-display text-lg font-bold uppercase text-city-red text-glow-red">
    <svg class="h-7 w-7" viewBox="0 0 24 24" aria-hidden="true">
      <path d="m12 3 10 18H2L12 3Z" fill="currentColor" opacity=".22" />
      <path d="m12 3 10 18H2L12 3ZM12 9v5M12 17h.01" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" />
    </svg>
    Active Crises
  </div>

  <div class="alerts-track">
    <article *ngFor="let alert of alerts" class="alert-card">
      <ng-container [ngSwitch]="iconFor(alert)">
        <svg *ngSwitchCase="'water'" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 3s7 7.1 7 12a7 7 0 0 1-14 0c0-4.9 7-12 7-12Z" />
        </svg>
        <svg *ngSwitchCase="'power'" viewBox="0 0 24 24" aria-hidden="true">
          <path d="m13 2-9 12h7l-1 8 10-13h-7l0-7Z" />
        </svg>
        <svg *ngSwitchDefault viewBox="0 0 24 24" aria-hidden="true">
          <path d="m12 3 10 18H2L12 3Z" />
        </svg>
      </ng-container>
      <span>{{ alert }}</span>
    </article>
  </div>
</section>
