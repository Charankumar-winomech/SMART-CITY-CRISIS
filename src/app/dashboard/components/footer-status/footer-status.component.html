<footer class="city-card footer-grid px-4 py-3">
  <div class="status-brand">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M7 18a5 5 0 1 1 1.2-9.85A7 7 0 0 1 21 12a4 4 0 0 1-1 7H7Z" fill="currentColor" opacity=".9" />
      <path d="M8 21v1M14 21v1M18 21v1" stroke="currentColor" stroke-linecap="round" stroke-width="2" />
    </svg>
    <strong>Weather<br>Conditions</strong>
  </div>

  <div class="footer-item">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M7 18a5 5 0 1 1 1.2-9.85A7 7 0 0 1 21 12a4 4 0 0 1-1 7H7Z" fill="none" stroke="currentColor" stroke-width="2" />
      <path d="M8 21v1M14 21v1M18 21v1" stroke="currentColor" stroke-linecap="round" stroke-width="2" />
    </svg>
    <div>
      <span>Condition</span>
      <strong class="text-city-cyan">{{ weather.condition }}</strong>
    </div>
  </div>

  <div class="footer-item red">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M14 14.8V5a4 4 0 0 0-8 0v9.8a6 6 0 1 0 8 0Z" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" />
      <path d="M10 6v9" stroke="currentColor" stroke-linecap="round" stroke-width="2" />
    </svg>
    <div>
      <span>Temperature</span>
      <strong>{{ weather.temperature | number: '1.2-2' }} <small>deg C</small></strong>
    </div>
  </div>

  <div class="footer-item">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M12 3s7 7.1 7 12a7 7 0 0 1-14 0c0-4.9 7-12 7-12Z" fill="none" stroke="currentColor" stroke-width="2" />
    </svg>
    <div>
      <span>Humidity</span>
      <strong>{{ weather.humidity | number: '1.2-2' }} <small>%</small></strong>
    </div>
  </div>

  <div class="footer-item violet">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M12 7v5l3 2M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" />
      <path d="M19 4v4h-4" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" />
    </svg>
    <div>
      <span>Last Updated</span>
      <strong>{{ lastUpdated | date: 'h:mm:ss a' }}</strong>
    </div>
  </div>
</footer>
