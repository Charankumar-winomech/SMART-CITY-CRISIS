<section class="city-card h-full p-4">
  <header class="mb-4 flex items-center gap-3">
    <svg class="h-7 w-7 text-city-cyan drop-shadow-[0_0_10px_rgba(32,183,255,.9)]" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M12 3s7 7.1 7 12a7 7 0 0 1-14 0c0-4.9 7-12 7-12Z" fill="currentColor" />
    </svg>
    <h2 class="panel-title text-city-cyan">Water Levels</h2>
  </header>

  <div class="overflow-hidden rounded-lg border border-cyan-400/20 bg-slate-950/45">
    <article *ngFor="let reservoir of reservoirs" class="reservoir-row">
      <div class="min-w-0">
        <h3 class="reservoir-name">{{ reservoir.label }}</h3>
      </div>

      <strong
        class="value"
        [class.critical]="reservoir.status === 'critical' || reservoir.status === 'offline'"
        [class.warning]="reservoir.status === 'warning'"
      >
        {{ displayValue(reservoir) }}
      </strong>

      <div class="progress-shell" aria-hidden="true">
        <div
          class="progress-fill"
          [class.critical]="reservoir.status === 'critical' || reservoir.status === 'offline'"
          [class.warning]="reservoir.status === 'warning'"
          [style.width.%]="progressValue(reservoir)"
        ></div>
      </div>
    </article>
  </div>

  <div class="mt-4 flex items-center justify-center gap-4 rounded-lg border border-city-red/75 bg-city-red/10 px-4 py-3 text-city-red shadow-red">
    <svg class="h-7 w-7" viewBox="0 0 24 24" aria-hidden="true">
      <path d="m12 3 10 18H2L12 3Z" fill="currentColor" opacity=".22" />
      <path d="m12 3 10 18H2L12 3ZM12 9v5M12 17h.01" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" />
    </svg>
    <span class="text-center text-base font-semibold">{{ criticalCount }} Reservoirs Critical</span>
  </div>
</section>
