<header class="city-card relative overflow-hidden px-4 py-4 sm:px-6">
  <div class="absolute inset-0 header-circuit opacity-70"></div>
  <div class="relative z-10 flex flex-col gap-5 xl:flex-row xl:items-center xl:justify-between">
    <div class="flex items-center gap-4">
      <div class="logo-mark">
        <svg viewBox="0 0 90 82" aria-hidden="true">
          <path d="M8 68h74M17 68V25l12-7v50M35 68V12l12 7v49M55 68V28l15 9v31" fill="none" stroke="currentColor" stroke-width="2.4" />
          <path d="M22 33h4M22 42h4M22 51h4M40 26h4M40 36h4M40 46h4M61 42h4M61 52h4" stroke="currentColor" stroke-width="2" />
          <path d="M7 72c19 5 54 5 76 0" fill="none" stroke="currentColor" stroke-width="1.8" opacity=".7" />
        </svg>
      </div>
      <div>
        <h1 class="font-display text-3xl font-bold leading-none text-slate-100 sm:text-4xl">SMART CITY</h1>
        <p class="mt-1 font-display text-base font-semibold uppercase tracking-normal text-city-cyan text-glow-cyan sm:text-lg">
          Crisis Monitoring Dashboard
        </p>
      </div>
    </div>

    <div class="flex flex-col gap-3 sm:flex-row sm:items-center xl:gap-6">
      <div class="header-readout">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M7 3v4M17 3v4M4 9h16M6 5h12a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Z" />
        </svg>
        <div>
          <div>{{ now | date: 'MMM d, y' }}</div>
          <span>{{ now | date: 'EEEE' }}</span>
        </div>
      </div>

      <div class="header-readout">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 7v5l3 2M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
        </svg>
        <div>{{ now | date: 'h:mm:ss a' }}</div>
      </div>

      <button type="button" class="alert-button" aria-label="Open active alerts">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="m12 3 10 18H2L12 3Z" />
          <path d="M12 9v5M12 17h.01" />
        </svg>
        <span>Active Alerts</span>
        <strong>{{ activeAlertCount }}</strong>
      </button>
    </div>
  </div>
</header>
